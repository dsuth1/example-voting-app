name: Build and Scan Voting App Images
on:
  push:
    branches: [main]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [vote, worker, result]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }}
        run: docker build -t voting-app/${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      - name: Scan ${{ matrix.service }}
        uses: sysdiglabs/scan-action@v6
        with:
          image-tag: voting-app/${{ matrix.service }}:${{ github.sha }}
          sysdig-secure-token: ${{ secrets.SYSDIG_SECURE_TOKEN }}
          sysdig-secure-url: ${{ secrets.SYSDIG_SECURE_URL }}
          stop-on-failed-policy-eval: true

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ github.workspace }}/sarif.json
